name: ci

on:
  pull_request:
  push:
    branches:
      - main

concurrency:
  group: drone-ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: "22.x"
          cache: pnpm

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.4"

      - name: Install dependencies
        run: pnpm install --ignore-workspace --frozen-lockfile

      - name: Generate BAML client
        run: pnpm baml:generate

      - name: Type-check
        run: pnpm typecheck

      - name: Test
        run: pnpm test

      - name: Pack, install, and smoke release artifact
        run: pnpm verify:package -- --pack-destination "$RUNNER_TEMP/drone-package"
