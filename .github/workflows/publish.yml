name: publish

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "npm dist-tag to publish under"
        required: false
        default: "latest"

concurrency:
  group: drone-publish
  cancel-in-progress: false

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: "22.x"
          registry-url: "https://registry.npmjs.org"

      - name: Install dependencies
        run: pnpm install --ignore-workspace --frozen-lockfile

      - name: Generate BAML client
        run: pnpm baml:generate

      - name: Build
        run: pnpm build

      - name: Test
        run: pnpm test

      - name: Check if version already published
        id: version-check
        run: |
          PKG_NAME=$(node -p "require('./package.json').name")
          PKG_VERSION=$(node -p "require('./package.json').version")
          if npm view "${PKG_NAME}@${PKG_VERSION}" version > /dev/null 2>&1; then
            echo "${PKG_NAME}@${PKG_VERSION} already on registry — skipping"
            echo "skip=true" >> "$GITHUB_OUTPUT"
          else
            echo "Publishing ${PKG_NAME}@${PKG_VERSION}"
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Publish to npm
        if: steps.version-check.outputs.skip != 'true'
        run: pnpm publish --no-git-checks --access public --tag "$DIST_TAG"
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
          DIST_TAG: ${{ github.event.inputs.tag || 'latest' }}
